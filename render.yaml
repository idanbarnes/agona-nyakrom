services:
  - type: web
    name: agonanyakrom
    runtime: static
    rootDir: public-frontend
    buildCommand: npm run build:render
    staticPublishPath: dist
    routes:
      - type: redirect
        source: /announcements/:slug
        destination: /announcements/:slug/
      - type: redirect
        source: /events/:slug
        destination: /events/:slug/
      - type: redirect
        source: /obituary/:slug/
        destination: /obituaries/:slug/
      - type: redirect
        source: /obituary/:slug
        destination: /obituaries/:slug/
      - type: redirect
        source: /obituaries/:slug
        destination: /obituaries/:slug/
      - type: redirect
        source: /hall-of-fame/:slug
        destination: /hall-of-fame/:slug/
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://agonanyakrom-api.onrender.com
      - key: VITE_PUBLIC_SITE_URL
        value: https://agonanyakrom.onrender.com
  - type: web
    name: agonanyakrom-admin
    runtime: static
    rootDir: admin-frontend
    buildCommand: npm run build:render
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://agonanyakrom-api.onrender.com
      - key: VITE_PUBLIC_SITE_URL
        value: https://agonanyakrom.onrender.com
